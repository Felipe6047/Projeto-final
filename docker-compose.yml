services:
  mysql:
    image: mysql:8.0
    container_name: frik-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-frik_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-frik}
      MYSQL_USER: ${MYSQL_USER:-frik}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-frik_pass}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: frik-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 3333
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://127.0.0.1:3000}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-frik}
      DB_PASSWORD: ${MYSQL_PASSWORD:-frik_pass}
      DB_NAME: ${MYSQL_DATABASE:-frik}
      JWT_SECRET: ${JWT_SECRET:-frik-docker-jwt-secret-change-in-production}
      JWT_EXPIRES_IN: 7d
      TAXA_TROCA_PONTOS: 50
      PONTOS_POR_REAL: 1
    ports:
      - "${BACKEND_PORT:-3333}:3333"
    command: sh -c "npm run db:migrate && npm run db:seed && npm start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3333/api}
    container_name: frik-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  mysql_data:
